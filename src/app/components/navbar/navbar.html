<header class="fixed top-0 z-10 w-full mx-auto mt-2 flex items-center justify-center">

  <!-- Desktop nav pill -->
  <nav id="header-nav" class="nav-shadow hidden md:flex px-3 text-sm font-medium rounded-full justify-center items-center">
    <a class="relative block px-2 py-2 transition hover:text-yellow-500 dark:hover:text-yellow-400" aria-label="Home" href="#hero">Home</a>
    <a class="relative block px-2 py-2 transition hover:text-yellow-500 dark:hover:text-yellow-400" aria-label="Experiencia" href="#experience">Experiencia</a>
    <a class="relative block px-2 py-2 transition hover:text-yellow-500 dark:hover:text-yellow-400" aria-label="Proyectos" href="#projects">Proyectos</a>
    <a class="relative block px-2 py-2 transition hover:text-yellow-500 dark:hover:text-yellow-400" aria-label="Sobre-mi" href="#about-me">Sobre mí</a>
    <a class="relative block px-2 py-2 transition hover:text-yellow-500 dark:hover:text-yellow-400" aria-label="Tecnologías" href="#technologies">Tecnologías</a>
    <div class="relative ml-1 mr-1">
      <button id="theme-toggle-btn" class="appearance-none border-none flex hover:scale-125 transition" (click)="onToggleTheme()"
              type="button" aria-expanded="false" aria-haspopup="true">
        <span class="sr-only">Elige el tema</span>
        <sun-icon></sun-icon>
        <moon-icon></moon-icon>
        <system-icon></system-icon>
      </button>
      <div id="themes-menu" class="absolute hidden scale-80 top-8 right-0 text-sm p-1 min-w-32 rounded-md border border-gray-100 bg-white/90 dark:bg-gray-900/90 dark:border-gray-500/20 shadow-[0_3px_10px_rgb(0,0,0,0.2)] backdrop-blur-md">
        <ul>
          <li class="themes-menu-option px-2 py-1.5 cursor-default hover:bg-neutral-400/40 dark:hover:bg-gray-500/50 rounded-sm"
              (click)="onClickToggleItem(themeEnum.light)">Light</li>
          <li class="themes-menu-option px-2 py-1.5 cursor-default hover:bg-neutral-400/40 dark:hover:bg-gray-500/50 rounded-sm"
              (click)="onClickToggleItem(themeEnum.dark)">Dark</li>
          <li class="themes-menu-option px-2 py-1.5 cursor-default hover:bg-neutral-400/40 dark:hover:bg-gray-500/50 rounded-sm"
              (click)="onClickToggleItem(themeEnum.system)">System</li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Mobile header bar -->
  <div class="flex md:hidden w-full items-center justify-between px-4 py-2 nav-shadow rounded-full mx-4 text-sm font-medium">
    <span class="font-semibold">Portfolio</span>
    <button (click)="toggleMenu()" class="appearance-none border-none flex items-center justify-center w-8 h-8" aria-label="Menu">
      @if (isMenuOpen) {
        <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      }
    </button>
  </div>

  <!-- Mobile dropdown menu -->
  @if (isMenuOpen) {
    <div class="absolute top-14 inset-x-4 md:hidden rounded-xl border border-gray-100 dark:border-gray-500/20 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md shadow-lg p-2 z-20">
      <nav class="flex flex-col text-sm font-medium">
        <a class="px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" href="#hero" (click)="closeMenu()">Home</a>
        <a class="px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition hover:text-yellow-500 dark:hover:text-yellow-400" href="#experience" (click)="closeMenu()">Experiencia</a>
        <a class="px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition hover:text-yellow-500 dark:hover:text-yellow-400" href="#projects" (click)="closeMenu()">Proyectos</a>
        <a class="px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition hover:text-yellow-500 dark:hover:text-yellow-400" href="#about-me" (click)="closeMenu()">Sobre mí</a>
        <a class="px-4 py-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition hover:text-yellow-500 dark:hover:text-yellow-400" href="#technologies" (click)="closeMenu()">Tecnologías</a>
        <hr class="my-1 border-gray-200 dark:border-gray-700">
        <div class="flex gap-1 px-2 py-1">
          <button class="flex-1 py-2 text-xs rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" (click)="onClickToggleItem(themeEnum.light); closeMenu()">☀️ Light</button>
          <button class="flex-1 py-2 text-xs rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" (click)="onClickToggleItem(themeEnum.dark); closeMenu()">🌙 Dark</button>
          <button class="flex-1 py-2 text-xs rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition" (click)="onClickToggleItem(themeEnum.system); closeMenu()">💻 System</button>
        </div>
      </nav>
    </div>
  }

</header>

<br>
